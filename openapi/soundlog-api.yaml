          type: string
          maxLength: 128
          description: 중복 이관 방지용 클라이언트 생성 키
        momentLogCount:
          type: integer
          minimum: 0
          default: 0
        libraryTrackCount:
          type: integer
          minimum: 0
          default: 0
        recapDraftCount:
          type: integer
          minimum: 0
          default: 0

    LocalDataMigrationResult:
      type: object
      required:
        - accepted
        - migrated
      properties:
        accepted:
          type: boolean
          example: true
        migrated:
          type: object
          required:
