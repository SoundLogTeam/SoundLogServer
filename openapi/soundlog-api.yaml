      type: object
      required:
        - provider
      properties:
        provider:
          type: string
          enum:
            - kakao
            - apple
            - google
        authorizationCode:
          type: string
          description: Authorization Code + PKCE 방식 provider에서 전달하는 code
        idToken:
          type: string
          description: Apple/Google 등에서 받은 ID token
        providerAccessToken:
          type: string
          description: Kakao 등 access token 검증 방식 provider에서 전달하는 token
        providerToken:
          type: string
          deprecated: true
          description: 기존 mock/레거시 클라이언트 호환용 provider token
        codeVerifier:
          type: string
          description: PKCE code verifier
        redirectUri:
          type: string
          example: soundlog://auth/callback
        deviceId:
          type: string
          deprecated: true
          description: 기존 mock 로그인 호환용 device id
        device:
          $ref: "#/components/schemas/AuthDeviceInfo"

