name: Deploy API to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to build and deploy. Defaults to the current commit SHA.
        required: false
        type: string

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          for name in DOCKERHUB_USERNAME DOCKERHUB_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${GITHUB_SHA::12}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            image_tag="${{ inputs.image_tag }}"
          fi

          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_.-]{1,128}$ ]]; then
            echo "Invalid Docker image tag: ${image_tag}"
            exit 1
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/soundlog-server:${{ steps.meta.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/soundlog-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull and restart on EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          CLIENT_URLS: ${{ secrets.CLIENT_URLS }}
          UPLOAD_PUBLIC_BASE_URL: ${{ secrets.UPLOAD_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          missing=()
          for name in EC2_HOST EC2_USER EC2_SSH_KEY EC2_SSH_PORT EC2_APP_DIR POSTGRES_PASSWORD JWT_SECRET CLIENT_URL CLIENT_URLS UPLOAD_PUBLIC_BASE_URL; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Prepare EC2 app directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            set -eu
            mkdir -p "${{ secrets.EC2_APP_DIR }}"
            docker --version
            docker compose version

      - name: Copy production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          source: docker-compose.prod.yml
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            set -eu
            cd "${{ secrets.EC2_APP_DIR }}"

            cat > .env <<'ENV'
            DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/soundlog-server:${{ needs.build-and-push.outputs.image_tag }}
            API_PORT=${{ secrets.API_PORT }}
            CLIENT_URL=${{ secrets.CLIENT_URL }}
            CLIENT_URLS=${{ secrets.CLIENT_URLS }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN_SECONDS=${{ secrets.JWT_EXPIRES_IN_SECONDS }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }}
            KAKAO_APP_ID=${{ secrets.KAKAO_APP_ID }}
            ML_RECOMMENDATION_API_URL=${{ secrets.ML_RECOMMENDATION_API_URL }}
            ML_RECOMMENDATION_TIMEOUT_MS=${{ secrets.ML_RECOMMENDATION_TIMEOUT_MS }}
            REQUEST_BODY_LIMIT=${{ secrets.REQUEST_BODY_LIMIT }}
            MOMENT_PHOTO_MAX_FILE_SIZE_MB=${{ secrets.MOMENT_PHOTO_MAX_FILE_SIZE_MB }}
            TOUR_API_BASE_URL=${{ secrets.TOUR_API_BASE_URL }}
            TOUR_API_SERVICE_KEY=${{ secrets.TOUR_API_SERVICE_KEY }}
            ALLOW_DEV_AUTH_FALLBACK=${{ secrets.ALLOW_DEV_AUTH_FALLBACK }}
            UPLOAD_PUBLIC_BASE_URL=${{ secrets.UPLOAD_PUBLIC_BASE_URL }}
            UPLOAD_PUBLIC_PATH=${{ secrets.UPLOAD_PUBLIC_PATH }}
            USE_MOCK_DB=${{ secrets.USE_MOCK_DB }}
            ENV

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
